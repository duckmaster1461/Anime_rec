<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- App name & theme -->
    <title>AniMatch — Anime Recommendation & Comparison</title>
    <meta name="application-name" content="AniMatch" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon & icons (put your 512/192/180 px variants in /public/assets) -->
    <link rel="icon" href="%PUBLIC_URL%/assets/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/assets/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO -->
    <meta
      name="description"
      content="AniMatch helps you discover, compare, and sort anime by rating, year, season, and more. Fast filters, clean UI, smart recommendations."
    />
    <meta name="keywords" content="anime, recommendation, compare anime, ratings, seasons, AniMatch" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AniMatch — Anime Recommendation & Comparison" />
    <meta
      property="og:description"
      content="Discover and compare anime with powerful filters for rating, year, season, and more."
    />
    <meta property="og:image" content="%PUBLIC_URL%/assets/logo.png" />
    <meta property="og:url" content="/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AniMatch — Anime Recommendation & Comparison" />
    <meta
      name="twitter:description"
      content="Discover and compare anime with powerful filters for rating, year, season, and more."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/assets/logo.png" />

    <!-- Prefer no-translate for app UIs -->
    <meta name="google" content="notranslate" />
  </head>

  <body>
    <noscript>This app needs JavaScript enabled to run AniMatch.</noscript>
    <div id="root"></div>
  </body>
</html>
